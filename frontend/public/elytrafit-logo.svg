<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark glow background -->
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ffed4a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
  
  <!-- Main glow circle -->
  <circle cx="40" cy="40" r="36" fill="url(#goldGlow)"/>
  
  <!-- Gold Fitness Figure with Leaves -->
  <g transform="translate(12, 12)">
    <!-- Top-left leaf -->
    <path d="M4 6 Q8 2 12 6 Q10 4 12 10 T14 14" 
          fill="url(#goldGrad)" opacity="0.9" stroke="#ffcc00" strokeWidth="0.5"/>
    
    <!-- Gold figure -->
    <g stroke="#ffcc00" strokeWidth="1" strokeLinejoin="round">
      <!-- Head with shine -->
      <circle cx="32" cy="14" r="5" fill="url(#goldGrad)"/>
      <circle cx="32" cy="12" r="1.8" fill="rgba(255,255,255,0.6)"/>
      
      <!-- Torso -->
      <ellipse cx="32" cy="26" rx="8" ry="11" fill="url(#goldGrad)"/>
      
      <!-- Left arm (raised dynamic) -->
      <path d="M20 24 Q16 28 18 34 Q17 36 20 35" 
            fill="none" stroke="url(#goldGrad)" strokeWidth="4.5"/>
      
      <!-- Right arm (raised dynamic) -->
      <path d="M44 24 Q48 28 46 34 Q47 36 44 35" 
            fill="none" stroke="url(#goldGrad)" strokeWidth="4.5"/>
      
      <!-- Left leg -->
      <path d="M27 37 Q25 45 29 43 Q30 47 32 45" 
            fill="none" stroke="url(#goldGrad)" strokeWidth="4"/>
      
      <!-- Right leg -->
      <path d="M37 37 Q39 45 35 43 Q34 47 32 45" 
            fill="none" stroke="url(#goldGrad)" strokeWidth="4"/>
    </g>
    
    <!-- Bottom-right leaf -->
    <path d="M48 52 Q52 48 56 52 Q54 50 56 56 T58 60" 
          fill="url(#goldGrad)" opacity="0.9" stroke="#ffcc00" strokeWidth="0.5"/>
  </g>
  
  <!-- Sparkle effects -->
  <circle cx="32" cy="14" r="10" fill="url(#goldGrad)" opacity="0.3"/>
  <circle cx="20" cy="36" r="3" fill="#ffffff" opacity="0.7"/>
  <circle cx="48" cy="38" r="2.5" fill="#ffffff" opacity="0.7"/>
  
  <!-- Outer gold ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#goldGrad)" strokeWidth="1.5" opacity="0.4"/>
</svg>
